name: Build MSIX

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build distributable
        run: ./gradlew createDistributable

      - name: Create dummy assets
        run: |
          mkdir composeApp\build\compose\binaries\main\app\Paper-track\Assets
          $bytes = [byte[]]@(137, 80, 78, 71, 13, 10, 26, 10, 0, 0, 0, 13, 73, 72, 68, 82, 0, 0, 0, 1, 0, 0, 0, 1, 8, 6, 0, 0, 0, 31, 21, 196, 137, 0, 0, 0, 10, 73, 68, 65, 84, 120, 156, 99, 0, 1, 0, 0, 5, 0, 1, 13, 10, 45, 180, 0, 0, 0, 0, 73, 69, 78, 68, 174, 66, 96, 130)
          [System.IO.File]::WriteAllBytes("composeApp\build\compose\binaries\main\app\Paper-track\Assets\StoreLogo.png", $bytes)
          Copy-Item composeApp\build\compose\binaries\main\app\Paper-track\Assets\StoreLogo.png composeApp\build\compose\binaries\main\app\Paper-track\Assets\Square150x150Logo.png
          Copy-Item composeApp\build\compose\binaries\main\app\Paper-track\Assets\StoreLogo.png composeApp\build\compose\binaries\main\app\Paper-track\Assets\Square44x44Logo.png

      - name: Copy manifest
        run: Copy-Item AppxManifest.xml composeApp\build\compose\binaries\main\app\Paper-track\

      - name: Pack MSIX
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Select-Object -First 1 -ExpandProperty FullName
          & $makeappx pack /d composeApp\build\compose\binaries\main\app\Paper-track /p Papertrack.msix

      - uses: actions/upload-artifact@v4
        with:
          name: Papertrack-msix
          path: Papertrack.msix